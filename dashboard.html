<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>لوحة العملاء | MenuGo</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<!-- ===== Firebase (Firestore) ===== -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDN00X10I8hdJY8iKV2kdu5CcUbxMrqwLU",
    authDomain: "menugo-e2edf.firebaseapp.com",
    projectId: "menugo-e2edf",
    storageBucket: "menugo-e2edf.firebasestorage.app",
    messagingSenderId: "1051576121364",
    appId: "1:1051576121364:web:3f0a5b34dfadb75c144f01",
    measurementId: "G-XN75JDJ0E4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<style>
  :root{
    --bg:#0d1220; --panel:#141b2e; --panel-2:#1b2540; --line:rgba(255,255,255,0.08);
    --text:#eef1f8; --muted:#8b93ab; --accent:#17d8b0; --accent-dim:rgba(23,216,176,0.14);
    --warn:#e5734a; --radius:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Tajawal',sans-serif; min-height:100vh; padding:20px 16px 60px;}
  button{font-family:inherit; cursor:pointer; border:none;}
  input{font-family:inherit;}

  .top{margin-bottom:20px;}
  .top h1{font-size:22px; margin-bottom:4px;}
  .top p{color:var(--muted); font-size:13px;}

  .gate{
    max-width:340px; margin:60px auto; background:var(--panel); border:1px solid var(--line);
    border-radius:var(--radius); padding:28px 22px; text-align:center;
  }
  .gate .mark{width:52px; height:52px; border-radius:14px; background:var(--accent-dim); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:24px; margin:0 auto 14px;}
  .gate input{width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--panel-2);
    color:var(--text); font-size:16px; text-align:center; letter-spacing:3px; margin-bottom:10px;}
  .gate button{width:100%; padding:12px; border-radius:10px; background:var(--accent); color:#04231d; font-weight:800;}
  .gate-err{color:var(--warn); font-size:12px; margin-top:8px; display:none;}

  #app{display:none;}
  #app.show{display:block;}

  .add-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:18px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  }
  .add-card input{
    flex:1; min-width:160px; padding:11px 13px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); font-size:14px;
  }
  .add-card button{
    background:var(--accent); color:#04231d; font-weight:800; padding:11px 18px; border-radius:10px; font-size:13.5px;
  }

  .shop-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:12px;
  }
  .shop-card .name{font-size:16px; font-weight:800; margin-bottom:2px;}
  .shop-card .sid{color:var(--muted); font-size:12px; margin-bottom:12px; direction:ltr; text-align:right;}
  .shop-card .links{display:flex; gap:8px; flex-wrap:wrap;}
  .shop-card a{
    flex:1; min-width:120px; text-align:center; padding:10px; border-radius:10px; font-size:13px; font-weight:700;
    text-decoration:none;
  }
  .shop-card .admin-link{background:var(--panel-2); color:var(--accent); border:1px solid var(--line);}
  .shop-card .public-link{background:var(--accent-dim); color:var(--accent); border:1px solid var(--line);}

  .empty{color:var(--muted); text-align:center; padding:40px 20px; font-size:13.5px;}
  .loading{color:var(--muted); text-align:center; padding:40px 20px;}
</style>
</head>
<body>

  <div class="gate" id="gate">
    <div class="mark">M</div>
    <h2 style="margin-bottom:6px;">لوحة العملاء</h2>
    <p style="color:var(--muted); font-size:13px; margin-bottom:16px;">هاد الصفحة ليك انت فقط، فيها كل عملاء MenuGo</p>
    <input type="password" id="ownerPin" inputmode="numeric" maxlength="6" placeholder="الكود السري ديالك">
    <button onclick="checkOwnerPin()">دخول</button>
    <div class="gate-err" id="gateErr">الكود خاطئ</div>
  </div>

  <div id="app">
    <div class="top">
      <h1>👥 لوحة العملاء</h1>
      <p>جميع محلات MenuGo فمكان واحد</p>
    </div>

    <div class="add-card">
      <input type="text" id="newShopId" placeholder="معرف محل جديد (مثلاً: shams)">
      <button onclick="addNewShop()">+ محل جديد</button>
    </div>

    <div id="shopsList" class="loading">كنحملو لائحة المحلات...</div>
  </div>

<script>
  // الكود السري لهاد الصفحة (صفحة المالك). بدلو من هنا فالكود مباشرة.
  const OWNER_PIN = '9090';

  function checkOwnerPin(){
    const val = document.getElementById('ownerPin').value;
    if(val === OWNER_PIN){
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').classList.add('show');
      loadShops();
    } else {
      document.getElementById('gateErr').style.display = 'block';
    }
  }
  document.getElementById('ownerPin').addEventListener('keydown', e=>{ if(e.key==='Enter') checkOwnerPin(); });

  function baseUrl(){
    return location.origin + location.pathname.replace(/dashboard\.html$/, '');
  }

  async function loadShops(){
    const wrap = document.getElementById('shopsList');
    try{
      const snap = await db.collection('shops').get();
      if(snap.empty){
        wrap.innerHTML = '<div class="empty">مازال ماكاين حتى محل. زيد واحد من فوق.</div>';
        return;
      }
      const base = baseUrl();
      let html = '';
      snap.forEach(doc=>{
        const data = doc.data();
        const id = doc.id;
        const name = data.name || id;
        html += `
          <div class="shop-card">
            <div class="name">${escapeHtml(name)}</div>
            <div class="sid">shop=${escapeHtml(id)}</div>
            <div class="links">
              <a class="admin-link" href="${base}admin.html?shop=${encodeURIComponent(id)}" target="_blank">⚙️ لوحة التحكم</a>
              <a class="public-link" href="${base}index.html?shop=${encodeURIComponent(id)}" target="_blank">👁️ صفحة المحل</a>
            </div>
          </div>`;
      });
      wrap.innerHTML = html;
    }catch(e){
      console.error(e);
      wrap.innerHTML = '<div class="empty">تعذر تحميل اللائحة، تأكد من الاتصال بالأنترنت</div>';
    }
  }

  function addNewShop(){
    const raw = document.getElementById('newShopId').value.trim();
    const id = raw.toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    if(!id){ alert('كتب معرف صحيح (حروف إنجليزية وأرقام فقط)'); return; }
    const base = baseUrl();
    window.open(base + 'admin.html?shop=' + encodeURIComponent(id), '_blank');
    setTimeout(loadShops, 2000);
  }

  function escapeHtml(s){
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
